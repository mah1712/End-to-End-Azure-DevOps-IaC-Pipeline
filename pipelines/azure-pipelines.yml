trigger:
- main

variables:
  # 1. Connectivity & Pool
  serviceConnection: 'Azure-Service-Connection'
  poolName: 'Default'
  
  # 2. Paths & Files
  workingDir: '$(System.DefaultWorkingDirectory)/terraform/env/dev'
  tfVarsFile: 'terraform.tfvars'
  
  # 3. Backend State Configuration (State Storage)
  backendRG: 'rg-terraform-mgmt'
  backendSA: 'stterraformstate001'
  backendContainer: 'tfstate'
  backendKey: 'dev.terraform.tfstate'
  
  # 4. Pipeline Artifacts
  planArtifactName: 'tfplan'
  
  # 5. Notifications & Approvals
  approverEmail: 'your-email@example.com' 

  # 6. API Keys & Secrets
  # BEST PRACTICE: Never hardcode secrets like API keys in your YAML file. 
  # Instead, define these as 'Secret Variables' in the Azure DevOps Pipeline UI.
  # The below line is a placeholder; the actual value will be picked from ADO Secret Variables.
  INFRACOST_API_KEY: $(INFRACOST_API_KEY) 

stages:
# STAGE 1: Pre-Planning Quality Gates (Quality & Security)
- stage: Quality_Security_Scan
  displayName: '1. Quality & Security'
  jobs:
  - job: StaticScan
    displayName: 'Code Quality Scan'
    pool:
      name: $(poolName)
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTaskV4@4
      displayName: 'Terraform Init'
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(workingDir)
        backendServiceArm: $(serviceConnection)
        backendAzureRmResourceGroupName: $(backendRG)
        backendAzureRmStorageAccountName: $(backendSA)
        backendAzureRmContainerName: $(backendContainer)
        backendAzureRmKey: $(backendKey)

    - task: TerraformTaskV4@4
      displayName: 'Terraform Format'
      inputs:
        provider: 'azurerm'
        command: 'fmt'
        workingDirectory: $(workingDir)
        commandOptions: '-check -recursive'

    - task: TerraformTaskV4@4
      displayName: 'Terraform Validate'
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: $(workingDir)

    - task: Bash@3
      displayName: 'Security Scans (TFSec & Checkov)'
      inputs:
        targetType: 'inline'
        script: |
          tfsec $(workingDir)
          checkov -d $(workingDir) --quiet

# STAGE 2: Infrastructure Planning & Compliance
- stage: Infrastructure_Plan
  displayName: '2. Plan & Compliance'
  dependsOn: Quality_Security_Scan
  jobs:
  - job: TerraformPlan
    displayName: 'Generate Plan & Scan Policy'
    pool:
      name: $(poolName)
    steps:
    - task: TerraformTaskV4@4
      displayName: 'Terraform Plan'
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: $(workingDir)
        environmentServiceNameAzureRM: $(serviceConnection)
        commandOptions: '-var-file="$(tfVarsFile)" -out=$(Build.ArtifactStagingDirectory)/$(planArtifactName)'

    - task: Bash@3
      displayName: 'Azure Policy Scan (Terrascan)'
      inputs:
        targetType: 'inline'
        script: |
          ./terrascan scan -t azure -d $(workingDir) --plan-local $(Build.ArtifactStagingDirectory)/$(planArtifactName)

    - task: Bash@3
      displayName: 'Infracost (Cost Estimation)'
      env:
        INFRACOST_API_KEY: $(INFRACOST_API_KEY)
      inputs:
        targetType: 'inline'
        script: |
          curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh
          infracost breakdown --path $(workingDir) --format json --out-file infracost-report.json
          infracost output --path infracost-report.json --format table

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Plan'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)/$(planArtifactName)'
        artifact: $(planArtifactName)

# STAGE 3: Manual Approval Gate (Assistance Mode)
- stage: Approval_Gate
  displayName: '3. Approval Gate'
  dependsOn: Infrastructure_Plan
  jobs:
  - job: ManualValidationJob
    displayName: 'Human Intervention'
    pool: server
    steps:
    - task: ManualValidation@0
      timeoutInMinutes: 1440 
      inputs:
        notifyUsers: $(approverEmail)
        instructions: 'Please review the Terraform Plan, Azure Policy compliance, and Infracost results before approving the deployment.'
        onTimeout: 'reject'

# STAGE 4: Production Deployment
- stage: Infrastructure_Apply
  displayName: '4. Production Apply'
  dependsOn: Approval_Gate
  condition: succeeded()
  jobs:
  - job: Apply
    displayName: 'Final Deployment'
    pool:
      name: $(poolName)
    steps:
    - checkout: self
    - task: DownloadPipelineArtifact@1
      displayName: 'Download Plan'
      inputs:
        artifactName: $(planArtifactName)
        targetPath: $(workingDir)
    
    - task: TerraformTaskV4@4
      displayName: 'Terraform Apply'
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: $(workingDir)
        environmentServiceNameAzureRM: $(serviceConnection)
        commandOptions: $(planArtifactName)
